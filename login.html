  MindBloom — Login
  STANDALONE ADD-ON FILE. Does not modify, import, or depend on any

  index.html, mood.html, activities.html, insights.html, support.html.

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mental Marvels — Login</title>
<meta name="description" content="Log in to your Mental Marvels account.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
/* ============================================================
   MindBloom Login — scoped, self-contained styles
   (variables copied from the shared design system so the look
   matches; the original CSS file is never touched)
   ============================================================ */
:root{
  --lavender:#C9B6F2; --sky:#9BB8F0; --skylight:#BFE3F5;
  --pink:#F5A9D0; --pink-deep:#E06BB0;
  --yellow:#F5D06B; --yellow-deep:#E0A93D;
  --green:#A8C68A; --green-deep:#6E9A4E;
  --cream:#FFF9EE; --cream2:#FDF6EC;
  --orange:#FF8A3D;
  --ink-purple:#3D2C6B; --ink-magenta:#7A2E8C; --ink-teal:#1E5F5A;
  --radius-lg:32px; --radius-md:24px; --radius-sm:16px;
  --space-1:8px; --space-2:16px; --space-3:24px; --space-4:32px; --space-5:48px;
  --font-display:'Fredoka', sans-serif; --font-body:'Quicksand', sans-serif;
  --shadow-soft: 0 20px 45px -18px rgba(61,44,107,0.28);
  --shadow-card: 0 14px 30px -12px rgba(61,44,107,0.22);
  --error-red:#C24E4E;
}

.mb-login *{ box-sizing:border-box; }

.mb-login{
  margin:0; min-height:100vh; font-family:var(--font-body); color:var(--ink-purple);
  background:linear-gradient(180deg, var(--lavender) 0%, var(--sky) 45%, var(--skylight) 100%);
  display:flex; align-items:center; justify-content:center;
  padding: var(--space-4) var(--space-2);
}

.mb-login .login-card{
  width:100%; max-width:420px;
  background:rgba(255,249,238,.8);
  backdrop-filter:blur(10px);
  border-radius:var(--radius-lg);
  box-shadow:var(--shadow-card);
  border:1px solid rgba(255,255,255,.6);
  padding: var(--space-5) var(--space-4);
  animation: mb-fade-up .5s ease both;
}

@keyframes mb-fade-up{
  from{ opacity:0; transform:translateY(14px); }
  to{ opacity:1; transform:translateY(0); }
}

.mb-login .login-brand{
  display:flex; align-items:center; justify-content:center; gap:8px;
  margin-bottom: var(--space-3);
}
.mb-login .login-brand .emoji{ font-size:28px; }
.mb-login .login-brand span{
  font-family:var(--font-display); font-weight:600; font-size:22px; color:var(--ink-purple);
}

.mb-login h1{
  font-family:var(--font-display); font-weight:600; font-size:24px;
  text-align:center; margin: 0 0 6px;
}
.mb-login .login-sub{
  text-align:center; font-size:15px; color:var(--ink-purple); opacity:.75;
  margin: 0 0 var(--space-4);
}

.mb-login form{ display:flex; flex-direction:column; gap: var(--space-3); }

.mb-login .field{ display:flex; flex-direction:column; gap:6px; }
.mb-login label{ font-weight:600; font-size:14px; }

.mb-login input{
  width:100%;
  padding: 14px 18px;
  border-radius: var(--radius-md);
  border: 1.5px solid rgba(61,44,107,0.15);
  background: rgba(255,255,255,.7);
  font-family: var(--font-body);
  font-size: 15px;
  color: var(--ink-purple);
  outline: none;
  transition: border-color .25s ease, box-shadow .25s ease, background .25s ease;
}
.mb-login input::placeholder{ color: rgba(61,44,107,0.4); }
.mb-login input:focus{
  border-color: var(--pink-deep);
  box-shadow: 0 0 0 4px rgba(224,107,176,0.15);
  background: #fff;
}
.mb-login input[aria-invalid="true"]{
  border-color: var(--error-red);
  box-shadow: 0 0 0 4px rgba(194,78,78,0.12);
}

.mb-login .field-error{
  font-size: 13px;
  color: var(--error-red);
  min-height: 16px;
  display:none;
}
.mb-login .field-error.show{ display:block; }

.mb-login .form-error{
  font-size: 14px;
  color: var(--error-red);
  background: rgba(194,78,78,0.08);
  border: 1px solid rgba(194,78,78,0.25);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  display:none;
  text-align:center;
}
.mb-login .form-error.show{ display:block; }

.mb-login button[type="submit"]{
  margin-top: var(--space-1);
  border:none; cursor:pointer;
  font-family: var(--font-display);
  font-weight:600; font-size:16px;
  color:#fff;
  padding: 14px 20px;
  border-radius: var(--radius-md);
  background: linear-gradient(135deg, var(--pink-deep), var(--orange));
  box-shadow: var(--shadow-soft);
  transition: transform .2s ease, opacity .2s ease;
  display:flex; align-items:center; justify-content:center; gap:10px;
}
.mb-login button[type="submit"]:hover{ transform: translateY(-2px) scale(1.02); }
.mb-login button[type="submit"]:active{ transform: scale(.97); }
.mb-login button[type="submit"]:disabled{
  opacity:.75; cursor:default; transform:none;
}

.mb-login .spinner{
  width:16px; height:16px;
  border-radius:50%;
  border: 2.5px solid rgba(255,255,255,.5);
  border-top-color:#fff;
  animation: mb-spin .7s linear infinite;
  display:none;
}
.mb-login button[type="submit"].loading .spinner{ display:inline-block; }

@keyframes mb-spin{ to{ transform:rotate(360deg); } }

.mb-login .login-footer{
  text-align:center; margin-top: var(--space-3);
  font-size: 13px; color: var(--ink-purple); opacity:.7;
}
.mb-login .login-footer a{ color: var(--ink-magenta); text-decoration:none; font-weight:600; }
.mb-login .login-footer a:hover{ text-decoration:underline; }

/* Respect reduced motion preference */
@media (prefers-reduced-motion: reduce){
  .mb-login .login-card{ animation:none; }
  .mb-login button[type="submit"]{ transition:none; }
}
</style>
</head>
<body>

<div class="mb-login">
  <main class="login-card" role="main">
    <div class="login-brand">
      <span class="emoji">🌸</span>
      <span>Mental Marvels</span>
    </div>
    <h1>Welcome back</h1>
    <p class="login-sub">Take a breath — let's get you signed in.</p>

    <form id="loginForm" novalidate>
      <div class="field">
        <label for="loginEmail">Email or Username</label>
        <input
          type="text"
          id="loginEmail"
          name="loginEmail"
          placeholder="you@example.com"
          autocomplete="username"
        >
        <div class="field-error" id="emailError"></div>
      </div>

      <div class="field">
        <label for="loginPassword">Password</label>
        <input
          type="password"
          id="loginPassword"
          name="loginPassword"
          placeholder="Enter your password"
          autocomplete="current-password"
        >
        <div class="field-error" id="passwordError"></div>
      </div>

      <div class="form-error" id="formError" role="alert"></div>

      <button type="submit" id="loginBtn">
        <span class="spinner" aria-hidden="true"></span>
        <span id="loginBtnLabel">Login</span>
      </button>
    </form>

    <p class="login-footer">
      New here? <a href="index.html">Explore Mental Marvels</a>
    </p>
  </main>
</div>

<script>
(function () {
  "use strict";

  // ---- Config ----
  var REDIRECT_PATH = "index.html"; // confirmed destination on successful login
  var LOADING_DELAY_MS = 500;

  // ---- Elements ----
  var form = document.getElementById("loginForm");
  var emailInput = document.getElementById("loginEmail");
  var passwordInput = document.getElementById("loginPassword");
  var emailError = document.getElementById("emailError");
  var passwordError = document.getElementById("passwordError");
  var formError = document.getElementById("formError");
  var loginBtn = document.getElementById("loginBtn");
  var loginBtnLabel = document.getElementById("loginBtnLabel");

  // Simple, permissive email format check (not a full RFC validator,
  // just enough to catch obviously malformed input like "foo" or "foo@bar")
  var EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

  function clearErrors() {
    emailError.textContent = "";
    emailError.classList.remove("show");
    passwordError.textContent = "";
    passwordError.classList.remove("show");
    formError.textContent = "";
    formError.classList.remove("show");
    emailInput.removeAttribute("aria-invalid");
    passwordInput.removeAttribute("aria-invalid");
  }

  function showFieldError(inputEl, errorEl, message) {
    errorEl.textContent = message;
    errorEl.classList.add("show");
    inputEl.setAttribute("aria-invalid", "true");
  }

  function setLoading(isLoading) {
    loginBtn.disabled = isLoading;
    loginBtn.classList.toggle("loading", isLoading);
    loginBtnLabel.textContent = isLoading ? "Logging in..." : "Login";
  }

  function validate() {
    clearErrors();
    var emailVal = emailInput.value.trim();
    var passwordVal = passwordInput.value; // don't trim passwords
    var valid = true;

    if (emailVal === "") {
      showFieldError(emailInput, emailError, "Please enter your email or username.");
      valid = false;
    } else if (emailVal.indexOf("@") !== -1 && !EMAIL_RE.test(emailVal)) {
      // Only enforce the email format check if it looks like they were
      // trying to type an email (contains "@"); plain usernames are fine.
      showFieldError(emailInput, emailError, "Please enter a valid email address.");
      valid = false;
    }

    if (passwordVal === "") {
      showFieldError(passwordInput, passwordError, "Please enter your password.");
      valid = false;
    }

    return valid;
  }

  form.addEventListener("submit", function (e) {
    e.preventDefault();

    if (loginBtn.disabled) return; // prevent double-submit

    var isValid = validate();
    if (!isValid) {
      formError.textContent = "Please fix the highlighted fields and try again.";
      formError.classList.add("show");
      return;
    }

    // No backend available: mock a successful auth check, then redirect.
    setLoading(true);

    setTimeout(function () {
      window.location.href = REDIRECT_PATH;
    }, LOADING_DELAY_MS);
  });

  // Clear a field's error as soon as the user starts fixing it
  emailInput.addEventListener("input", function () {
    if (emailInput.hasAttribute("aria-invalid")) {
      emailError.classList.remove("show");
      emailInput.removeAttribute("aria-invalid");
    }
  });
  passwordInput.addEventListener("input", function () {
    if (passwordInput.hasAttribute("aria-invalid")) {
      passwordError.classList.remove("show");
      passwordInput.removeAttribute("aria-invalid");
    }
  });
})();
</script>
